global:
  screen_max_width: 4000
  screen_max_height: 2200
  screen_fps: 5
  bots_count: 20

prompts:
  
  gpt:
    hypos_norm:
      gen: 
        text: prompts/gpt/hypos_norm/gen/hn_gen_gpt_text_latest
        json: prompts/gpt/hypos_norm/gen/hn_gen_gpt_json_latest
      filter:
        text: prompts/gpt/hypos_norm/filter/hn_filter_gpt_text_latest
        json: prompts/gpt/hypos_norm/filter/hn_filter_gpt_json_latest
  grok:
    hypos_norm:
      gen: 
        text: prompts/grok/hypos_norm/gen/hn_gen_grok_text_latest
        json: prompts/grok/hypos_norm/gen/hn_gen_grok_json_latest
      filter:
        text: prompts/grok/hypos_norm/filter/hn_filter_grok_text_latest
        json: prompts/grok/hypos_norm/filter/hn_filter_grok_json_latest
  claude_sonnet:
    hypos_norm:
      gen: 
        text: prompts/claude_sonnet/hypos_norm/gen/hn_gen_claude_sonnet_text_latest
        json: prompts/claude_sonnet/hypos_norm/gen/hn_gen_claude_sonnet_json_latest
      filter:
        text: prompts/claude_sonnet/hypos_norm/filter/hn_filter_claude_sonnet_text_latest
        json: prompts/claude_sonnet/hypos_norm/filter/hn_filter_claude_sonnet_json_latest
  gemini:
    hypos_norm:
      gen: 
        text: prompts/gemini/hypos_norm/gen/hn_gen_gemini_text_latest
        json: prompts/gemini/hypos_norm/gen/hn_gen_gemini_json_latest
      filter:
        text: prompts/gemini/hypos_norm/filter/hn_filter_gemini_text_latest
        json: prompts/gemini/hypos_norm/filter/hn_filter_gemini_json_latest
  qwen:
    hypos_norm:
      gen: 
        text: prompts/qwen/hypos_norm/gen/hn_gen_qwen_text_latest
        json: prompts/qwen/hypos_norm/gen/hn_gen_qwen_json_latest
      filter:
        text: prompts/qwen/hypos_norm/filter/hn_filter_qwen_text_latest
        json: prompts/qwen/hypos_norm/filter/hn_filter_qwen_json_latest

sites:
  gpt:
    url: https://chatgpt.com/

    home:
      reset:
        sequence:
          - type: hotkey
            keys: [ctrl, l]
          - type: wait
            seconds: 2.0
          - type: text
            value: https://chatgpt.com/
          - type: key
            key: enter
          - type: wait
            seconds: 3.0

    scenarios:
      study_learn:
        start_state: start_question

        states:
          start_question:
            expect:
              templates:
                - templates/firefox/brave/plus.png
              threshold: 0.88
            action: click
            condition:
              templates:
                - templates/firefox/brave/study_and_learn.png
              threshold: 0.88
            next:
              success: options_menu_opened
              fail: start_question
            timeout: 120.0

          options_menu_opened:
            expect:
              templates:
                - templates/firefox/brave/study_and_learn.png
              threshold: 0.9
            action: click
            condition:
              templates:
                - templates/firefox/brave/study_selected.png
              threshold: 0.7
            next:
              success: ask_empty
              fail: start_question
            timeout: 120.0

          ask_empty:
            expect:
              templates:
                - templates/firefox/brave/learn_something_new.png
              threshold: 0.9
            action: click_paste_enter
            condition:
              templates:
                - templates/firefox/brave/stop.png
              threshold: 0.9
            next:
              success: answer_processing
              fail: answer_processing
            timeout: 120.0

          answer_processing:
            expect:
              templates:
                - templates/firefox/brave/voice_mode.png
              threshold: 0.9
            action: click_ctrl_end
            condition:
              templates:
                - templates/firefox/brave/copy.png
              threshold: 0.9
            next:
              success: end_of_answer
              fail: start_question
            timeout: 300.0

          end_of_answer:
            expect:
              templates:
                - templates/firefox/brave/copy.png
              threshold: 0.9
            action: click_copy_save_json_check
            condition:
              json_valid: true            
            next:
              success: start_question
              fail: start_question
            timeout: 120.0


  gemini:
    url: https://gemini.google.com/

    home:
      reset:
