      gen: 
        text: prompts/gemini/hypos_norm/gen/hn_gen_gemini_text_latest
        json: prompts/gemini/hypos_norm/gen/hn_gen_gemini_json_latest
      filter:
        text: prompts/gemini/hypos_norm/filter/hn_filter_gemini_text_latest
        json: prompts/gemini/hypos_norm/filter/hn_filter_gemini_json_latest
  qwen:
    hypos_norm:
      gen: 
        text: prompts/qwen/hypos_norm/gen/hn_gen_qwen_text_latest
        json: prompts/qwen/hypos_norm/gen/hn_gen_qwen_json_latest
      filter:
        text: prompts/qwen/hypos_norm/filter/hn_filter_qwen_text_latest
        json: prompts/qwen/hypos_norm/filter/hn_filter_qwen_json_latest

sites:
  gpt:
    url: https://chatgpt.com/

    home:
      reset:
        sequence:
          - type: hotkey
            keys: [ctrl, l]
          - type: wait
            seconds: 2.0
          - type: text
            value: https://chatgpt.com/
          - type: key
            key: enter
          - type: wait
            seconds: 3.0

    scenarios:
      web_search:
        start_state: start_question

        states:
          start_question:
            expect:
              templates:
                - templates/chromium/gpt/plus.png
              threshold: 0.7
            action: click
            condition:
              templates:
                - templates/chromium/gpt/more.png
              threshold: 0.7
            next:
              success: options_menu_opened
              fail: start_question
            timeout: 120.0

          options_menu_opened:
            expect:
              templates:
                - templates/chromium/gpt/more.png
              threshold: 0.7
            action: mousemove
            condition:
              templates:
                - templates/chromium/gpt/web_search.png
              threshold: 0.7
            next:
              success: select_web_search
              fail: start_question
            timeout: 120.0

          select_web_search:
            expect:
              templates:
                - templates/chromium/gpt/web_search.png
              threshold: 0.7
            action: click
            condition:
              templates:
                - templates/chromium/gpt/blue_search.png
              threshold: 0.7
            next:
              success: ask_empty
              fail: start_question
            timeout: 120.0

          ask_empty:
            expect:
              templates:
                - templates/chromium/gpt/search_the_web.png
              threshold: 0.7
            action: click_paste_enter
            condition:
              templates:
                - templates/chromium/gpt/stop.png
              threshold: 0.7
            next:
              success: answer_processing
              fail: answer_processing
            timeout: 120.0

          answer_processing:
            expect:
              templates:
                - templates/chromium/gpt/voice_mode.png
              threshold: 0.7
            action: mousemove
            condition:
              templates:
                - templates/chromium/gpt/voice_right_side.png
              threshold: 0.7
            next:
              success: page_end
              fail: start_question
            timeout: 400.0

          page_end:
            expect:
              templates:
                - templates/chromium/gpt/voice_right_side.png
              threshold: 0.7
            action: click_ctrl_end
            condition:
              templates:
                - templates/chromium/gpt/try_again_more.png
              threshold: 0.7
            next:
              success: end_of_answer
              fail: start_question
            timeout: 300.0

          end_of_answer:
            expect:
              templates:
                - templates/chromium/gpt/copy.png
              threshold: 0.7
            action: click_copy_save_json_check
            condition:
              json_valid: true            
            next:
              success: start_question
              fail: try_again
            timeout: 120.0

          try_again:
            expect:
              templates:
                - templates/chromium/gpt/try_again.png
              threshold: 0.7
            action: click
            condition:
              templates:
                - templates/chromium/gpt/try_again_option.png   
              threshold: 0.7
            next:
              success: select_try_again
              fail: start_question
            timeout: 120.0

          select_try_again:
            expect:
              templates:
                - templates/chromium/gpt/try_again_option.png
              threshold: 0.7
            action: click
            condition:
              templates:
                - templates/chromium/gpt/plus.png   
              threshold: 0.7
            next:
              success: answer_processing
              fail: start_question
            timeout: 120.0
            
    #   1 my_state:
    #   2   expect:
    #   3     templates:
    #   4       - templates/trigger.png
    #   5     threshold: 0.7
    #   6   action: click_paste_file_enter
    #   7   file: /path/to/your/prompt.txt  # ← путь к файлу
    #   8   condition:
    #   9     templates:
    #  10       - templates/result.png
    #  11     threshold: 0.7
    #  12   next:
    #  13     success: next_state
    #  14     fail: retry_state


